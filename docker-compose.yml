services:
  mysql:
    image: mysql:8.0.34
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: trilogis_adapter_test
      MYSQL_ROOT_PASSWORD: local
      MYSQL_ROOT_HOST: "%"
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-plocal"]
      interval: 5s
      timeout: 5s
      retries: 10

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: trilogis_adapter_test
      MYSQL_USER: root
      MYSQL_PASSWORD: local
      RAILS_ENV: test
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    working_dir: /app
    command: bundle exec rake test

volumes:
  mysql_data:
  bundle_cache:
